      - path: ../../../outputs/swift_bench_inputs/7s.json
      - path: ../../../outputs/swift_bench_inputs/10s.json
      - path: ../../../outputs/swift_bench_inputs/15s.json
      - path: ../../../outputs/swift_bench_inputs/30s.json
      - path: ../../../outputs/swift_bench_inputs/hnsf_weights.json
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.kokoro.externalbakeoff.ConfigFIOSRunner
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    dependencies:
      - package: KokoroPipeline
        product: KokoroPipeline
