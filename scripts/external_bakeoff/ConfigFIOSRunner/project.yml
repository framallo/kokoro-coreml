name: ConfigFIOSRunner
options:
  bundleIdPrefix: com.kokoro.externalbakeoff
  deploymentTarget:
    iOS: "18.0"

packages:
  KokoroPipeline:
    path: ../../../swift

targets:
  ConfigFIOSRunner:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - path: ../../../coreml/kokoro_duration_exact_t44.mlpackage
      - path: ../../../coreml/kokoro_duration_exact_t105.mlpackage
      - path: ../../../coreml/kokoro_duration_exact_t156.mlpackage
      - path: ../../../coreml/kokoro_duration_exact_t219.mlpackage
      - path: ../../../coreml/kokoro_duration_exact_t476.mlpackage
      - path: ../../../coreml/kokoro_f0ntrain_t120.mlpackage
      - path: ../../../coreml/kokoro_f0ntrain_t280.mlpackage
      - path: ../../../coreml/kokoro_f0ntrain_t400.mlpackage
      - path: ../../../coreml/kokoro_f0ntrain_t600.mlpackage
      - path: ../../../coreml/kokoro_f0ntrain_t1200.mlpackage
      - path: ../../../coreml/kokoro_decoder_pre_3s.mlpackage
      - path: ../../../coreml/kokoro_decoder_pre_7s.mlpackage
      - path: ../../../coreml/kokoro_decoder_pre_10s.mlpackage
      - path: ../../../coreml/kokoro_decoder_pre_15s.mlpackage
      - path: ../../../coreml/kokoro_decoder_pre_30s.mlpackage
      - path: ../../../coreml/kokoro_decoder_har_post_3s.mlpackage
      - path: ../../../coreml/kokoro_decoder_har_post_7s.mlpackage
      - path: ../../../coreml/kokoro_decoder_har_post_10s.mlpackage
      - path: ../../../coreml/kokoro_decoder_har_post_15s.mlpackage
      - path: ../../../coreml/kokoro_decoder_har_post_30s.mlpackage
