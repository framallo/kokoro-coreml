# XcodeGen spec for the iPhone benchmark app.
#
# Builds a headless SwiftUI app that runs the same pre-tokenized bakeoff
# inputs (Resources/bench_inputs/*.json, generated by
# scripts/prepare_swift_bench_inputs.py) through two TTS arms:
#   1. KokoroPipeline   — this repo's Swift + Core ML/ANE pipeline
#   2. KokoroSwift      — mlalma/kokoro-ios, the MLX Swift port of Kokoro
# and writes warm-median timings to Documents/results.json.
#
# Regenerate the project with: xcodegen generate --spec project.yml
name: KokoroIPhoneBench
options:
  bundleIdPrefix: com.mattmireles
  deploymentTarget:
    iOS: "18.0"
packages:
  KokoroPipeline:
    path: ../swift
  # Vendored at tag 1.0.8 (cd7f5f3) with one patch: Package.swift declares
  # the MLXFast product that LayerNormInference.swift imports. Upstream
  # builds under bare SwiftPM but fails Xcode's explicit-module build.
  KokoroSwift:
    path: Vendor/kokoro-ios
  # Direct dependency for NpyzReader (loads voices.npz in the app). Same URL
  # and version kokoro-ios pins, so SPM resolves a single copy.
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    exactVersion: 0.0.6
targets:
  KokoroIPhoneBench:
    type: application
    platform: iOS
    sources:
      - path: Sources
      # .mlpackage entries compile to .mlmodelc in the app bundle root.
      - path: Resources/coreml
        type: group
        buildPhase: resources
      - path: Resources/bench_inputs
        type: group
        buildPhase: resources
      - path: Resources/mlx
        type: group
        buildPhase: resources
    dependencies:
      - package: KokoroPipeline
        product: KokoroPipeline
      - package: KokoroSwift
        product: KokoroSwift
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattmireles.KokoroIPhoneBench
        DEVELOPMENT_TEAM: 6ETYBAJKY8
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.9"
        # Don't generate Swift classes for the bundled Core ML models;
        # the app loads them by URL through KokoroModelProvider.
        COREML_CODEGEN_LANGUAGE: None
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1"
